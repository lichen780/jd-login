name: Build Android APK (使用 GitHub 托管的 Gradle，无需 gradlew)

on:
  push:
    branches:
      - main  # 当你 push 到 main 分支时触发构建

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout 代码
        uses: actions/checkout@v3

      # 2. 设置 JDK 17（Android 项目通常需要 JDK 11~17）
      - name: 设置 JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 使用 GitHub 官方推荐的 Gradle Action，自动下载 Gradle
      - name: 构建 Android 项目 (使用 Gradle)
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.4  # 你可以使用 7.6 / 8.4 / 8.5 等稳定版本
          arguments: assembleDebug  # 构建 debug APK，如需 release 改成 assembleRelease

      # 4. （可选）如果你想上传生成的 APK 文件供下载，可以加上这一步
      - name: 上传 APK 文件（如果存在）
        uses: actions/upload-artifact@v3
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk  # ⚠️ 请根据你的实际模块名和路径修改！
