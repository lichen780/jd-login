name: 🤖 Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: 构建 Release APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 拉取源码
        uses: actions/checkout@v4

      - name: ⚙️ 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔑 使用固定签名密钥库
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks || echo "未设置 KEYSTORE_BASE64，使用临时密钥"
          if [ ! -f keystore.jks ]; then
            keytool -genkey -v -keystore keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias keyalias -storepass android -keypass android -dname "CN=Android, OU=Android, O=Android, L=Android, ST=Android, C=US"
          fi

      - name: 🔧 下载并安装 Gradle 9.4
        run: |
          wget https://github.com/gradle/gradle/releases/download/v9.4.0/gradle-9.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          ln -sf /opt/gradle-9.4/bin/gradle /usr/local/bin/gradle
          gradle --version

      - name: 🛠️ 构建项目
        run: |
          gradle assembleRelease --no-daemon
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: 📤 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/outputs/apk/release/*.apk
          if-no-files-found: error
