name: 自动编译并提交APP到代码仓库

# 触发条件：代码推送到main/master分支时触发
on:
  push:
    branches: [ main, master ]

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 赋予提交代码的权限

    steps:
      # 步骤1：拉取仓库代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，避免提交失败

      # 步骤2：配置Java环境（Android必备，非Android则删除）
      - name: 配置Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      # 步骤3：配置Android SDK（非Android则删除）
      - name: 配置Android SDK
        uses: android-actions/setup-android@v3

      # 步骤4：赋予Gradle执行权限（非Android则删除）
      - name: 授权Gradle
        run: chmod +x ./gradlew

      # 步骤5：编译APP（根据项目类型替换命令）
      - name: 编译Release包
        run: ./gradlew assembleRelease --no-daemon
        # iOS替换：xcodebuild -workspace YourApp.xcworkspace -scheme YourApp -configuration Release build
        # Maven替换：mvn clean package

      # 步骤6：创建产物存储目录（避免目录不存在）
      - name: 创建产物目录
        run: mkdir -p app-builds

      # 步骤7：复制编译产物到指定目录
      - name: 复制APP产物
        run: |
          # 复制APK/AAB到app-builds目录（根据实际产物路径调整）
          cp -rf app/build/outputs/apk/release/*.apk app-builds/
          cp -rf app/build/outputs/bundle/release/*.aab app-builds/
          # 生成构建信息文件（记录版本、提交哈希）
          echo "构建时间：$(date +%Y-%m-%d\ %H:%M:%S)" > app-builds/build-info.txt
          echo "提交哈希：${{ github.sha }}" >> app-builds/build-info.txt
          echo "分支：${{ github.ref_name }}" >> app-builds/build-info.txt

      # 步骤8：配置Git提交信息
      - name: 配置Git用户
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 步骤9：提交产物到仓库
      - name: 提交APP产物
        run: |
          git add app-builds/
          # 检查是否有变更，避免空提交
          if git diff --cached --quiet; then
            echo "无产物变更，跳过提交"
          else
            git commit -m "chore: 自动提交构建产物 ${{ github.sha }}"
            git push origin ${{ github.ref_name }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
