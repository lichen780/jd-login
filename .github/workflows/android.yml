name: 🤖 自动生成APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: 构建 Release APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 拉取源码
        uses: actions/checkout@v4

      - name: ⚙️ 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔑 使用固定签名密钥库
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ] && [ "${{ secrets.KEYSTORE_BASE64 }}" != "" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
            echo "使用 Secrets 中的固定密钥库"
            echo "use_secret=true" >> $GITHUB_OUTPUT
          else
            keytool -genkeypair -v -keystore keystore.jks -alias keyalias -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android, OU=Android, O=Android, L=Android, ST=Android, C=US"
            echo "未设置 Secrets，生成临时密钥库（每次构建不同）"
            echo "use_secret=false" >> $GITHUB_OUTPUT
          fi

      - name: 🔧 下载并安装 Gradle 9.4
        run: |
          wget https://services.gradle.org/distributions/gradle-9.4.0-all.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          ln -sf /opt/gradle-9.4/bin/gradle /usr/local/bin/gradle
          gradle --version

      - name: 🛠️ 构建项目（使用固定密钥）
        if: steps.keystore.outputs.use_secret == 'true'
        run: |
          gradle assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=keystore.jks \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=keyalias \
            -Pandroid.injected.signing.key.password=android

      - name: 🛠️ 构建项目（使用临时密钥）
        if: steps.keystore.outputs.use_secret != 'true'
        run: |
          gradle assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=keystore.jks \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=keyalias \
            -Pandroid.injected.signing.key.password=android

      - name: 📤 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/outputs/apk/release/*.apk
          if-no-files-found: error
