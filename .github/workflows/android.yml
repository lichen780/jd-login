name: 自动编译并提交APP到代码仓库

on:
  push:
    branches: [ main, master ]
    paths-ignore:  # 排除产物目录，避免循环触发
      - 'app-builds/**'

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 关键修复：JDK 升级到17（适配新版sdkmanager）
      - name: 配置Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 优化Android SDK配置：指定版本+跳过JDK检查+强制更新
      - name: 配置Android SDK
        uses: android-actions/setup-android@v3
        with:
          # 指定兼容JDK17的SDK版本，避免自动下载最新版导致冲突
          sdk-tools-version: 10406996
          # 跳过JDK版本检查（兜底）
          skip-jdk-version-check: true

      # 手动接受Android许可证（解决sdkmanager授权问题）
      - name: 接受Android SDK许可证
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $ANDROID_HOME/cmdline-tools/bin/sdkmanager --licenses || true

      - name: 授权Gradle
        run: chmod +x ./gradlew

      # 编译时指定JDK路径，确保Gradle使用JDK17
      - name: 编译Release包
        run: |
          export JAVA_HOME=$(echo /usr/lib/jvm/temurin-17*)
          ./gradlew assembleRelease --no-daemon

      - name: 创建产物目录
        run: mkdir -p app-builds

      - name: 复制APP产物
        run: |
          cp -rf app/build/outputs/apk/release/*.apk app-builds/
          cp -rf app/build/outputs/bundle/release/*.aab app-builds/
          echo "构建时间：$(date +%Y-%m-%d\ %H:%M:%S)" > app-builds/build-info.txt
          echo "提交哈希：${{ github.sha }}" >> app-builds/build-info.txt
          echo "分支：${{ github.ref_name }}" >> app-builds/build-info.txt

      - name: 配置Git用户
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 提交APP产物
        run: |
          git add app-builds/
          if git diff --cached --quiet; then
            echo "无产物变更，跳过提交"
          else
            git commit -m "chore: 自动提交构建产物 ${{ github.sha }}"
            git push origin ${{ github.ref_name }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
